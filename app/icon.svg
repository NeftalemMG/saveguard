<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer penny circle - Green -->
  <circle cx="16" cy="16" r="16" fill="#00804C"/>
  
  <!-- Coin rim - Yellow -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#DBE64C" stroke-width="2"/>
  
  <!-- Inner circle for depth -->
  <circle cx="16" cy="16" r="10.5" fill="#006B3F"/>
  
  <!-- Pig snout - large yellow oval -->
  <ellipse cx="16" cy="16" rx="7" ry="6" fill="#DBE64C"/>
  
  <!-- Two prominent nostrils - very visible -->
  <ellipse cx="13" cy="16" rx="1.8" ry="2" fill="#00804C"/>
  <ellipse cx="19" cy="16" rx="1.8" ry="2" fill="#00804C"/>
  
  <!-- Subtle highlight on top of snout -->
  <ellipse cx="16" cy="13.5" rx="3" ry="1.5" fill="#F6F7ED" opacity="0.3"/>
</svg>
