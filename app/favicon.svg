<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer coin circle - Green -->
  <circle cx="16" cy="16" r="15" fill="#00804C" stroke="#DBE64C" stroke-width="2"/>
  
  <!-- Inner coin details -->
  <circle cx="16" cy="16" r="12" fill="#00804C" stroke="#74C365" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Dollar sign -->
  <text x="16" y="22" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#DBE64C" text-anchor="middle">$</text>
  
  <!-- Small decorative dots around edge -->
  <circle cx="16" cy="4" r="0.8" fill="#DBE64C" opacity="0.6"/>
  <circle cx="16" cy="28" r="0.8" fill="#DBE64C" opacity="0.6"/>
  <circle cx="4" cy="16" r="0.8" fill="#DBE64C" opacity="0.6"/>
  <circle cx="28" cy="16" r="0.8" fill="#DBE64C" opacity="0.6"/>
  
  <!-- Diagonal decorative dots -->
  <circle cx="8" cy="8" r="0.6" fill="#DBE64C" opacity="0.4"/>
  <circle cx="24" cy="24" r="0.6" fill="#DBE64C" opacity="0.4"/>
  <circle cx="24" cy="8" r="0.6" fill="#DBE64C" opacity="0.4"/>
  <circle cx="8" cy="24" r="0.6" fill="#DBE64C" opacity="0.4"/>
</svg>
